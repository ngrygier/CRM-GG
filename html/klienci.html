<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klienci</title>
    <link rel="stylesheet" href="/style/klienci.css">
</head>
<body>

<div class="container-wrapper">

    <!-- MENU BOCZNE -->

    <nav class="side_list">
        <button class="tab" data-page="utworz.html">UTWÓRZ</button>
        <button class="tab" data-page="klienci.html">KLIENCI</button>
        <button class="tab" data-page="oferty.html">OFERTY</button>
        <button class="tab" data-page="projects/projectPanel.html">PROJEKTY</button>
        <button class="tab" data-page="umowy.html">UMOWY</button>
        <button class="tab" data-page="kalendarz.html">KALENDARZ</button>
        <button class="tab" data-page="">DOSTĘPY</button>
        <button class="tab" data-page="">USTAWIENIA</button>

        <div class="logo">
            <img src="/.idea/assets/Logo.png" alt="Logo">
        </div>
    </nav>

    <div class="container">

        <main class="main">

            <!-- GÓRNE MENU -->

            <div class="status_menu_container">
                <section class="status-menu clients-top-menu">

                    <button
                            class="status-item active-status"
                            data-view="create">
                        UTWÓRZ KLIENTA
                    </button>

                    <button
                            class="status-item"
                            data-view="list">
                        LISTA KLIENTÓW
                    </button>

                </section>
            </div>

            <!-- HAMBURGER -->

            <button class="hamburger" id="hamburgerBtn">
                ☰
            </button>

            <nav class="burger-menu">
                <section class="tabs">
                    <button class="tab" data-page="utworz.html">UTWÓRZ</button>
                    <button class="tab" data-page="klienci.html">KLIENCI</button>
                    <button class="tab" data-page="oferty.html">OFERTY</button>
                    <button class="tab" data-page="projects/projectPanel.html">PROJEKTY</button>
                    <button class="tab" data-page="umowy.html">UMOWY</button>
                    <button class="tab" data-page="kalendarz.html">KALENDARZ</button>
                    <button class="tab" data-page="">DOSTĘPY</button>
                    <button class="tab" data-page="">USTAWIENIA</button>
                </section>
            </nav>

            <!-- UTWÓRZ KLIENTA -->

            <section id="createClientSection">

                <form id="clientForm" class="client-form">

                    <div class="form-heading">
                        <p class="eyebrow">Klienci</p>
                        <h1 id="formTitle">Nowy klient</h1>
                    </div>

                    <div class="form-grid">

                        <label>
                            Imię
                            <input type="text" name="firstName" required>
                        </label>

                        <label>
                            Nazwisko
                            <input type="text" name="lastName" required>
                        </label>

                        <label>
                            Telefon
                            <input type="tel" name="phone" required pattern="^\d{3}\s?\d{3}\s?\d{3}$">
                        </label>

                        <label>
                            E-mail
                            <input type="email" name="email" required pattern="[^@\s]+@[^@\s]+\.[^@\s]+">
                        </label>

                        <label>
                            Miasto
                            <input type="text" name="city">
                        </label>

                        <label>
                            Kod pocztowy
                            <input type="text" name="postalCode">
                        </label>

                    </div>

                    <label>
                        Adres
                        <textarea rows="3" name="address"></textarea>
                    </label>

                    <label>
                        Notatki
                        <textarea rows="5" name="notes"></textarea>
                    </label>

                    <div class="actions">

                        <button
                                type="button"
                                class="secondary-btn"
                                id="secondaryActionBtn">
                            Wyczyść
                        </button>

                        <button
                                type="submit"
                                class="primary-btn"
                                id="submitBtn">
                            Zapisz klienta
                        </button>

                    </div>

                </form>

            </section>

            <!-- LISTA KLIENTÓW -->

            <section id="clientsListSection" hidden>

            </section>

            <section id="clientDetailsSection" hidden>

            </section>

        </main>

    </div>

</div>

<script src="/js/klienci.js"></script>

</body>
</html>
