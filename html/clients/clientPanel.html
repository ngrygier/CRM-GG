<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klienci</title>
    <link rel="stylesheet" href="/style/clients.css">
    <link rel="stylesheet" href="/style/theme.css">
</head>
<body>
<div class="container-wrapper">
    <nav class="side_list">
        <button class="tab" onclick="window.location.href ='../utworz.html'">UTWÓRZ</button>
        <button class="tab active-dark" onclick="window.location.href='clientPanel.html'">KLIENCI</button>

        </div>
        <button id="themeToggle" class="theme-btn"> 🌙 </button>
    </nav>
    <div class="container">
        <main class="main">
            <div class="status_menu_container">
                <div class="form-heading">
                    <p class="eyebrow"> KLIENCI </p>

            </div>

            <nav class="burger-menu">

                    <button class="tab" onclick="window.location.href='../kalendarz.html'">KALENDARZ</button>
                    <button class="tab">DOSTĘPY</button>
                    <button class="tab" onclick="window.location.href='../ustawienia.html'">USTAWIENIA</button>
                </section>
            </nav>
            <section class="table-container" id="clientsContainer"></section>

<script type="module" src="../../js/clients/clientList.js"></script>
