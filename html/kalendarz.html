<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendarz</title>

    <link rel="stylesheet" href="../style/projects.css">
    <link rel="stylesheet" href="../style/kalendarz.css">
</head>
<body>

<div class="container-wrapper">

    <!-- SIDEBAR DESKTOP -->
    <nav class="side_list">
        <button class="tab" data-page="utworz.html">UTWÓRZ</button>
        <button class="tab" data-page="clients/clientPanel.html">KLIENCI</button>
        <button class="tab" data-page="oferty.html">OFERTY</button>
        <button class="tab" data-page="projects/projectPanel.html">PROJEKTY</button>
        <button class="tab" data-page="umowy.html">UMOWY</button>
        <button class="tab active-dark">KALENDARZ</button>
        <button class="tab">DOSTĘPY</button>
        <button class="tab" data-page="ustawienia.html">USTAWIENIA</button>

        <div class="logo">
            <img src="../.idea/assets/Logo.png" alt="Logo">
        </div>
    </nav>

    <button class="hamburger" id="hamburgerBtn">
        ☰
    </button>

    <nav class="burger-menu">
        <section class="tabs">
            <button class="tab" data-page="utworz.html">UTWÓRZ</button>
            <button class="tab" data-page="clients/clientPanel.html">KLIENCI</button>
            <button class="tab" data-page="oferty.html">OFERTY</button>
            <button class="tab" data-page="projects/projectPanel.html">PROJEKTY</button>
            <button class="tab" data-page="umowy.html">UMOWY</button>
            <button class="tab active-dark">KALENDARZ</button>
            <button class="tab">DOSTĘPY</button>
            <button class="tab" data-page="ustawienia.html">USTAWIENIA</button>
        </section>
    </nav>

    <!-- GŁÓWNA ZAWARTOŚĆ -->
    <main class="container">

        <!-- MENU MOBILE -->

        <!-- KALENDARZ -->
        <div class="calendar-card">

            <div class="calendar-header">
                <button id="prevMonth" class="calendar-btn">
                    ◀
                </button>

                <h2 id="monthYear"></h2>

                <button id="nextMonth" class="calendar-btn">
                    ▶
                </button>
            </div>

            <div class="calendar-days">
                <div>Pn</div>
                <div>Wt</div>
                <div>Śr</div>
                <div>Cz</div>
                <div>Pt</div>
                <div>So</div>
                <div>Nd</div>
            </div>

            <div id="calendar" class="calendar-grid"></div>

        </div>

    </main>

</div>

<script src="../js/kalendarz.js"></script>

</body>
</html>
