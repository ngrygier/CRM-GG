<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferty - CRM firmy kamieniarskiej</title>

    <link rel="stylesheet" href="../style/ofertyStyle.css">
</head>
<body>

<div class="container-wrapper">

    <nav class="side_list">

        <button class="tab"
                data-page="utworz.html">
            UTWÓRZ
        </button>

        <button class="tab">
            KLIENCI
        </button>

        <button class="tab active-dark">
            OFERTY
        </button>

        <button class="tab"
                data-page="projekty.html">
            PROJEKTY
        </button>

        <button class="tab"
                data-page="umowy.html">
            UMOWY
        </button>

        <button class="tab">
            KALENDARZ
        </button>

        <button class="tab">
            DOSTĘPY
        </button>

        <button class="tab">
            USTAWIENIA
        </button>

        <div class="logo">
            <img src="/.idea/assets/Logo.png" alt="Logo">
        </div>

    </nav>

    <button class="hamburger" id="hamburgerBtn">
        ☰
    </button>

    <nav class="burger-menu">
        <section class="tabs">
            <button class="tab" data-page="utworz.html">UTWÓRZ</button>
            <button class="tab">KLIENCI</button>
            <button class="tab">OFERTY</button>
            <button class="tab" data-page="projekty.html">PROJEKTY</button>
            <button class="tab" data-page="kalendarz.html">KALENDARZ</button>
            <button class="tab">DOSTĘPY</button>
            <button class="tab">USTAWIENIA</button>
        </section>
    </nav>

    <div class="container">

        <div class="placeholder-section">

            <div class="form-heading">

                <p class="eyebrow">
                    Oferty
                </p>

                <h1>
                    Zapisane oferty
                </h1>

            </div>

            <div class="offers-filters">

                <input
                        type="text"
                        id="searchClient"
                        placeholder="Imię lub nazwisko">

                <input
                        type="text"
                        id="searchNumber"
                        placeholder="Numer oferty">

                <input
                        type="date"
                        id="searchDate">

            </div>

            <div class="offers-table-wrapper">

                <table id="offersTable">

                <thead>

                <tr>
                    <th>Numer</th>
                    <th>Klient</th>
                    <th>Produkt</th>
                    <th>Data</th>
                    <th></th>
                </tr>

                </thead>

                <tbody id="offersBody">

                </tbody>

            </table>
            </div>

        </div>


    </div>

</div>

<script src="../js/oferty.js"></script>

</body>
</html>
