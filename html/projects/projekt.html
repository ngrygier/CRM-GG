<!DOCTYPE html>
<html lang="pl">
<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0">

    <title>Szczegóły projektu</title>

    <link
            rel="stylesheet"
            href="../../style/style.css">

</head>

<body>

<div class="container-wrapper">

    <div class="container">

        <main class="main">

            <section id="projectDetailsSection">

                <div class="client-details-card">

                    <div class="form-heading">

                        <p class="eyebrow">
                            PROJEKTY
                        </p>

                        <h1>
                            Szczegóły projektu
                        </h1>

                    </div>

                    <h2 id="projectTitle">
                        Projekt
                    </h2>

                    <div class="details-grid">

                        <div class="detail-item">

                            <span class="label">
                                STATUS
                            </span>

                            <span
                                    class="value"
                                    id="projectStatus">
                            </span>

                        </div>

                        <div class="detail-item">

                            <span class="label">
                                KLIENT
                            </span>

                            <span
                                    class="value"
                                    id="projectClient">
                            </span>

                        </div>

                        <div class="detail-item">

                            <span class="label">
                                TYP PRODUKTU
                            </span>

                            <span
                                    class="value"
                                    id="projectType">
                            </span>

                        </div>

                        <div class="detail-item">

                            <span class="label">
                                TERMIN REALIZACJI
                            </span>

                            <span
                                    class="value"
                                    id="projectDeadline">
                            </span>

                        </div>

                        <div
                                class="
                            detail-item
                            full-width">

                            <span class="label">
                                MATERIAŁ
                            </span>

                            <span
                                    class="value"
                                    id="projectMaterial">
                            </span>

                        </div>

                        <div
                                class="
                            detail-item
                            full-width">

                            <span class="label">
                                NOTATKI
                            </span>

                            <span
                                    class="value"
                                    id="projectNotes">
                            </span>

                        </div>

                    </div>

                    <hr>

                    <h3>
                        Dokumenty
                    </h3>

                    <div
                            class="projects-placeholder"
                            id="projectDocuments">

                        Brak dokumentów

                    </div>

                    <hr>

                    <h3>
                        Załączniki
                    </h3>

                    <div
                            class="projects-placeholder"
                            id="projectAttachments">

                        Brak załączników

                    </div>

                    <div class="actions">

                        <button
                                id="backBtn"
                                class="secondary-btn">

                            Powrót

                        </button>

                        <button
                                id="editProjectBtn"
                                class="secondary-btn">

                            Edytuj

                        </button>

                        <button
                                id="deleteProjectBtn"
                                class="primary-btn">

                            Usuń

                        </button>

                    </div>

                </div>

            </section>

        </main>

    </div>

</div>

<script
        type="module"
        src="../../js/projects/projectDetails.js">
</script>

</body>
</html>
