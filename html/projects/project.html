<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szczegóły projektu</title>
    <link rel="stylesheet" href="/style/clients.css">
    <link rel="stylesheet" href="/style/theme.css">
</head>
<body>
<div class="container-wrapper">
    <nav class="side_list">
        <button class="tab" onclick="window.location.href ='../utworz.html'">UTWÓRZ</button>
        <button class="tab" onclick="window.location.href ='../clients/clientPanel.html'">KLIENCI</button>
        <button class="tab" onclick="window.location.href ='../oferty.html'">OFERTY</button>
        <button class="tab active-dark" onclick="window.location.href='projectPanel.html'">PROJEKTY</button>
        <button class="tab" onclick="window.location.href='../umowy.html'">UMOWY</button>
        <button class="tab" onclick="window.location.href='../kalendarz.html'">KALENDARZ</button>
        <button class="tab">DOSTĘPY</button>
        <button class="tab" onclick="window.location.href='../ustawienia.html'">USTAWIENIA</button>
        <div class="logo">
            <img src="/.idea/assets/Logo.png" alt="Logo">
        </div>
        <button id="themeToggle" class="theme-btn"> 🌙 </button>
    </nav>

    <!-- hamburger -->
    <button class="hamburger" id="hamburgerBtn">
        ☰
    </button>

    <nav class="burger-menu">
        <section class="tabs">
            <button class="tab" onclick="window.location.href ='../utworz.html'">UTWÓRZ</button>
            <button class="tab" onclick="window.location.href ='../clients/clientPanel.html'">KLIENCI</button>
            <button class="tab" onclick="window.location.href ='../oferty.html'">OFERTY</button>
            <button class="tab active-dark" onclick="window.location.href='projectPanel.html'">PROJEKTY</button>
            <button class="tab" onclick="window.location.href='../umowy.html'">UMOWY</button>
            <button class="tab" onclick="window.location.href='../kalendarz.html'">KALENDARZ</button>
            <button class="tab">DOSTĘPY</button>
            <button class="tab" onclick="window.location.href='../ustawienia.html'">USTAWIENIA</button>
        </section>
    </nav>
    <div class="container">
        <main class="main">

            <!-- dołączenie do czatu-->
            <form id="formularzDoDolaczenia" class="formularzDolaczenia">
                <input type="text" id="nickname" class="tab" placeholder="Twój nick">
                <button type="submit" id="join" class="primary-btn">Dołącz</button>
            </form>

            <!-- detale projeku -->
            <section id="projectDetailsSection" style="display:none">
                <div class="client-details-card">
                    <div class="form-heading">
                        <p class="eyebrow"> PROJEKTY </p>
                        <h1> Szczegóły projektu </h1>
                    </div>
                    <h2 id="projectTitle"> Projekt </h2>
                    <div class="details-grid">
                        <div class="detail-item">
                            <span class="label"> STATUS </span>
                            <span class="value" id="projectStatus"></span>
                        </div>
                        <div class="detail-item">
                            <span class="label"> KLIENT </span>
                            <span class="value" id="projectClient"></span>
                        </div>
                        <div class="detail-item">
                            <span class="label"> TYP PRODUKTU </span>
                            <span class="value" id="projectType"></span>
                        </div>
                        <div class="detail-item">
                            <span class="label"> TERMIN REALIZACJI </span>
                            <span class="value" id="projectDeadline"></span>
                        </div>
                        <div class="
                            detail-item
                            full-width">
                            <span class="label"> MATERIAŁ </span>
                            <span class="value" id="projectMaterial"></span>
                        </div>
                        <div class="
                            detail-item
                            full-width">
                            <span class="label"> NOTATKI </span>
                            <span class="value" id="projectNotes"></span>
                        </div>
                    </div>
                    <hr>
                    <h3> Dokumenty </h3>
                    <div class="projects-placeholder" id="projectDocuments"> Brak dokumentów </div>
                    <hr>
                    <h3> Załączniki </h3>
                    <div class="projects-placeholder" id="projectAttachments"> Brak załączników </div>
                    <hr>

                    <h3>Notatki projektu</h3>

                    <div class="notes-container">

                        <div id="messages" class="messages"></div>

                        <form class="notes-input" id="notes-input">

                            <input
                                    type="text"
                                    id="messageInput"
                                    placeholder="Napisz wiadomość...">

                            <button id="sendBtn">
                                Wyślij
                            </button>

                        </form>

                        <button id="export-json">
                            Eksportuj historię notatek do JSON
                        </button>

                        <form class="notes-input" id="search-form">

                            <input
                                    id="search-notes"
                                    type="text"
                                    placeholder="Szukaj w notatkach...">

                            <button type="submit">
                                Szukaj
                            </button>

                        </form>

                        <form id="fileUploadForm">

                            <input
                                    type="file"
                                    id="attachment"
                                    name="attachment">

                            <button type="submit">
                                Dodaj załącznik
                            </button>

                        </form>

                    </div>
                    <div class="actions">
                        <button id="backBtn" class="secondary-btn"> Powrót </button>
                        <button id="editProjectBtn" class="secondary-btn"> Edytuj </button>
                        <button id="exportProjectBtn" class="secondary-btn"> Eksportuj </button>
                        <button id="deleteProjectBtn" class="primary-btn"> Usuń </button>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>
<script type="module" src="../../js/projects/projectDetails.js"></script>
<script src="../../js/theme.js"></script>
<script src = "../../js/projekt.js"></script>

</body>
</html>
